build:
  maxIssues: 0

style:
  MaxLineLength:
    maxLineLength: 120
  WildcardImport:
    active: true
    excludeImports:
      - "io.kotest.matchers.*"
      - "io.mockk.*"

complexity:
  TooManyFunctions:
    thresholdInClasses: 30
  LongParameterList:
    functionThreshold: 8

exceptions:
  TooGenericExceptionCaught:
    active: false
